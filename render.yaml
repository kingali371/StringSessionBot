services:
  - type: worker
    name: string-session-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 bot.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MUST_JOIN
        value: ""
      - key: SUPPORT_CHAT
        value: ""